name: farmbuddy
description: "FarmBuddy  — farm management for every farmer"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.2.0

  # Auth
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4

  # Data handling
  sqflite: ^2.3.3+1
  path: ^1.9.0
  shared_preferences: ^2.2.3

  # Web services
  http: ^1.2.2

  # Location services
  geolocator: ^13.0.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Camera services
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  path_provider: ^2.1.4

  # Notifications (optional, Phase 6)
  flutter_local_notifications: ^17.2.2

  intl: ^0.19.0
  uuid: ^4.4.2
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
